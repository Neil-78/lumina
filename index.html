<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Lumina - Presentación</title>
    <style>
        /* Paleta de colores basada en tu presentación */
        :root {
            --urn-purple: #6B4385;
            --lumina-blue: #93C6C9;
            --lumina-yellow: #FDE07A;
            --bg-color: #F8FBFB;
            --text-dark: #2C3E50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
            /* Degradado suave de fondo */
            background-image: linear-gradient(135deg, #ffffff 0%, #eef5f5 100%);
        }

        /* Animación de entrada */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(107, 67, 133, 0.15);
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
            border-top: 6px solid var(--lumina-blue);
        }

        .decorative-pattern {
            height: 15px;
            background-color: var(--lumina-blue);
            opacity: 0.7;
            /* Patrón sutil emulando las hojas de tu diseño */
            background-image: radial-gradient(white 2px, transparent 2px);
            background-size: 12px 12px;
        }

        .header {
            padding: 2.5rem 2rem 1.5rem;
            text-align: center;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--lumina-yellow), var(--lumina-blue), var(--urn-purple));
        }

        .title {
            font-size: 2.2rem;
            color: var(--urn-purple);
            margin-bottom: 0.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #7F8C8D;
            font-size: 1.1rem;
            font-style: italic;
        }

        .video-section {
            padding: 0 2rem 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .video-container {
            width: 100%;
            max-width: 640px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background-color: #000;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 1rem;
        }

        /* Efecto al pasar el cursor sobre el video */
        .video-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        video {
            width: 100%;
            height: auto;
            display: block;
        }

        .description {
            margin-top: 1.5rem;
            text-align: center;
            line-height: 1.6;
            color: #555;
            font-size: 1.05rem;
            max-width: 600px;
        }

        .footer {
            padding: 1.2rem;
            text-align: center;
            background-color: var(--urn-purple);
            color: white;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="decorative-pattern"></div>
        <div class="header">
            <h1 class="title">Proyecto Lumina</h1>
            <p class="subtitle">Ensamblaje y Funcionamiento</p>
        </div>

        <div class="video-section">
            <div class="video-container">
                <video controls autoplay muted playsinline>
                    <source src="video-lumina.mp4" type="video/mp4">
                    Tu navegador no soporta la reproducción de este video.
                </video>
            </div>
            <p class="description">
                Conoce el proceso práctico detrás de nuestro sistema de iluminación. 
                Desarrollo interdisciplinario con enfoque en sustentabilidad y eficiencia.
            </p>
        </div>

    </div>

</body>
</html>
